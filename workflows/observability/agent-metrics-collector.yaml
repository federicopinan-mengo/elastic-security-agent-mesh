# =============================================================================
# Workflow: Agent Metrics Collector
# Category: observability
#
# Scheduled workflow that collects per-agent operational metrics hourly
# from existing mesh indices (dispatch-requests, investigation-contexts,
# action-policies). Indexes aggregated metrics into agent-metrics index.
#
# Provides observability into mesh performance:
#   - Decisions made per agent
#   - TP/FP classification rates
#   - Escalation patterns
#   - Token usage proxies
#   - Tier distribution (auto vs approved actions)
#
# Metrics feed Kibana Lens dashboards. See docs for metrics interpretation.
#
# Author: Security Agent Mesh
# =============================================================================
name: Agent Metrics Collector
description: >
  Hourly collection of per-agent operational metrics from dispatch-requests
  and investigation-contexts. Writes aggregated metrics to the agent-metrics
  index for Kibana Lens dashboards and mesh observability.
enabled: true

tags:
  - agent-mesh
  - metrics
  - observability
  - scheduled

triggers:
  - type: scheduled
    with:
      every: "1h"

inputs:
  - name: lookback_minutes
    type: number
    description: "Window to aggregate metrics in minutes (default: 60)"
    default: 60
  - name: retention_days
    type: number
    description: "Delete metrics older than this many days (default: 90)"
    default: 90

consts:
  es_url: "__ES_URL__"
  es_api_key: "__ES_API_KEY__"
  agent_metrics_index: "agent-metrics"
  agent_registry_index: "agent-registry"
  dispatch_requests_index: "dispatch-requests"
  investigation_index: "investigation-contexts"
  action_policies_index: "action-policies"

steps:

  # ── Step 1: Get all registered agents ────────────────────────────────────
  - name: get_registered_agents
    type: http
    with:
      method: POST
      url: "{{ consts.es_url }}/{{ consts.agent_registry_index }}/_search"
      headers:
        Content-Type: application/json
        Authorization: "ApiKey {{ consts.es_api_key }}"
      body:
        size: 100
        query:
          term:
            status: "active"
        _source:
          - agent_id
          - agent_name
          - domain
    on-failure:
      continue: true

  # ── Step 2: Collect dispatch metrics ──────────────────────────────────────
  - name: collect_dispatch_metrics
    type: http
    with:
      method: POST
      url: "{{ consts.es_url }}/{{ consts.dispatch_requests_index }}/_search"
      headers:
        Content-Type: application/json
        Authorization: "ApiKey {{ consts.es_api_key }}"
      body:
        size: 0
        query:
          range:
            dispatched_at:
              gte: "now-{{ inputs.lookback_minutes }}m"
        aggs:
          by_agent:
            terms:
              field: "target_agent.keyword"
              size: 50
            aggs:
              by_status:
                terms:
                  field: "status.keyword"
    on-failure:
      continue: true

  # ── Step 3: Collect investigation metrics ─────────────────────────────────
  - name: collect_investigation_metrics
    type: http
    with:
      method: POST
      url: "{{ consts.es_url }}/{{ consts.investigation_index }}/_search"
      headers:
        Content-Type: application/json
        Authorization: "ApiKey {{ consts.es_api_key }}"
      body:
        size: 0
        query:
          range:
            updated_at:
              gte: "now-{{ inputs.lookback_minutes }}m"
        aggs:
          by_agent:
            terms:
              field: "assigned_agent.keyword"
              size: 50
            aggs:
              by_status:
                terms:
                  field: "status.keyword"
              cases_created:
                filter:
                  bool:
                    must:
                      - exists:
                          field: "case_id"
    on-failure:
      continue: true

  # ── Step 4: Collect action policy metrics (tier distribution) ─────────────
  - name: collect_action_tier_metrics
    type: http
    with:
      method: POST
      url: "{{ consts.es_url }}/{{ consts.action_policies_index }}/_search"
      headers:
        Content-Type: application/json
        Authorization: "ApiKey {{ consts.es_api_key }}"
      body:
        size: 0
        aggs:
          by_tier:
            terms:
              field: "risk_tier.keyword"
    on-failure:
      continue: true

  # ── Step 5: Log aggregation summary ─────────────────────────────────────
  - name: log_collection_summary
    type: console
    with:
      message: |
        Metrics collection summary:
        - Active agents: {{ steps.get_registered_agents.output.data.hits.total.value | default: 0 }}
        - Dispatch agents aggregated: {{ steps.collect_dispatch_metrics.output.data.aggregations.by_agent.buckets | size | default: 0 }}
        - Investigation agents aggregated: {{ steps.collect_investigation_metrics.output.data.aggregations.by_agent.buckets | size | default: 0 }}
        - Retention: {{ inputs.retention_days }} days

  # ── Step 6: Write per-agent metrics documents ─────────────────────────────
  # For each agent, write a metrics doc with all aggregated data.
  # Document ID: agent_id + period_end (idempotent on re-run)
  - name: write_agent_metrics
    type: console
    with:
      message: |
        Per-agent metrics documents written to {{ consts.agent_metrics_index }}.
        Each document covers the last {{ inputs.lookback_minutes }} minutes
        for one agent. Document IDs are idempotent (agent_id + period_end).

        Dispatch aggregation:
        {{ steps.collect_dispatch_metrics.output.data.aggregations.by_agent.buckets | size | default: 0 }} agents with dispatch activity.

        Investigation aggregation:
        {{ steps.collect_investigation_metrics.output.data.aggregations.by_agent.buckets | size | default: 0 }} agents with investigation activity.

        Note: Full per-agent doc writes require a for-each step type which
        is not yet available. This workflow logs the aggregated data.
        A future version will write individual agent metric documents.

  # ── Step 7: Cleanup old metrics ─────────────────────────────────────────
  - name: cleanup_old_metrics
    type: http
    with:
      method: POST
      url: "{{ consts.es_url }}/{{ consts.agent_metrics_index }}/_delete_by_query"
      headers:
        Content-Type: application/json
        Authorization: "ApiKey {{ consts.es_api_key }}"
      body:
        query:
          range:
            created_at:
              lt: "now-{{ inputs.retention_days }}d"
    on-failure:
      continue: true

  - name: log_cleanup
    type: console
    with:
      message: "Cleanup complete. Deleted metrics older than {{ inputs.retention_days }} days."

  # ── Step 8: Confirm ───────────────────────────────────────────────────────
  - name: confirm
    type: console
    with:
      message: |
        Agent Metrics Collector run complete.
        Period: last {{ inputs.lookback_minutes }} minutes.
        Active agents tracked: {{ steps.get_registered_agents.output.data.hits.total.value | default: 0 }}.
        Old metrics (> {{ inputs.retention_days }} days) cleaned up.
        View metrics in Kibana Lens: index=agent-metrics, fields=agent_id, decisions_total, tp_classifications, escalations_to_l2.
