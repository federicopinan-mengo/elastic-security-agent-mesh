# =============================================================================
# Workflow: Compliance Continuous Assessment
# Category: compliance
#
# Scheduled workflow that generates audit-ready compliance evidence documents
# from existing mesh data (detection rules, MITRE coverage, alert stats,
# incident history). Runs weekly by default. Writes structured evidence to
# kb-compliance index. Alerts SOC Ops when coverage gaps are detected.
#
# DORA: Article 13 (detect anomalies), Article 14 (threat intel),
#       Article 15 (respond)
# ISO 27001: A.12.1.1, A.12.1.2, A.18.1.1
# NIS2: Article 21 (risk management), Article 23 (incident response)
# PCI-DSS: Req 10.1 (audit log review), Req 11.1 (malware detection)
#
# Extensible: add new frameworks by editing consts.frameworks below.
#
# Author: Security Agent Mesh
# =============================================================================
name: Compliance Continuous Assessment
description: >
  Weekly compliance evidence generation for DORA, ISO 27001, NIS2, and PCI-DSS.
  Queries detection rules, MITRE coverage, alert stats, and incidents to
  produce structured evidence documents. Alerts on coverage gaps.
enabled: true

tags:
  - agent-mesh
  - compliance
  - scheduled
  - evidence

triggers:
  - type: scheduled
    with:
      every: "7d"

inputs:
  - name: interval_days
    type: number
    description: "Number of days to look back for evidence (default: 7)"
    default: 7
  - name: frameworks
    type: string
    description: "Comma-separated frameworks to assess (DORA,ISO27001,NIS2,PCIDSS)"
    default: "DORA,ISO27001,NIS2,PCIDSS"

consts:
  es_url: "__ES_URL__"
  es_api_key: "__ES_API_KEY__"
  kibana_url: "__KIBANA_URL__"
  kibana_api_key: "__KIBANA_API_KEY__"
  kb_compliance_index: "kb-compliance"
  alerts_index: ".alerts-security.alerts-default"
  investigation_index: "investigation-contexts"
  dispatch_requests_index: "dispatch-requests"

steps:

  # ── Step 1: Parse inputs ──────────────────────────────────────────────────
  - name: parse_frameworks
    type: console
    with:
      message: "Compliance assessment starting. Frameworks: __FRAMEWORKS__. Interval: __INTERVAL__ days."

  # ── Step 2: Query active detection rules ─────────────────────────────────
  - name: query_detection_rules
    type: http
    with:
      method: POST
      url: "{{ consts.es_url }}/{{ consts.alerts_index }}/_search"
      headers:
        Content-Type: application/json
        Authorization: "ApiKey {{ consts.es_api_key }}"
      body:
        size: 0
        query:
          range:
            "@timestamp":
              gte: "now-{{ inputs.interval_days }}d"
        aggs:
          by_rule:
            terms:
              field: "kibana.alert.rule.name"
              size: 1000
    on-failure:
      continue: true

  # ── Step 3: Query TP/FP alert counts ─────────────────────────────────────
  - name: query_tp_alerts
    type: http
    with:
      method: POST
      url: "{{ consts.es_url }}/{{ consts.alerts_index }}/_search"
      headers:
        Content-Type: application/json
        Authorization: "ApiKey {{ consts.es_api_key }}"
      body:
        size: 0
        query:
          bool:
            must:
              - range:
                  "@timestamp":
                    gte: "now-30d"
              - term:
                  kibana.alert.workflow_tags: "Triaged as True Positive by AI"
        aggs:
          total_tp:
            value_count:
              field: "_id"
    on-failure:
      continue: true

  - name: query_fp_alerts
    type: http
    with:
      method: POST
      url: "{{ consts.es_url }}/{{ consts.alerts_index }}/_search"
      headers:
        Content-Type: application/json
        Authorization: "ApiKey {{ consts.es_api_key }}"
      body:
        size: 0
        query:
          bool:
            must:
              - range:
                  "@timestamp":
                    gte: "now-30d"
              - term:
                  kibana.alert.workflow_tags: "Triaged as False Positive by AI"
        aggs:
          total_fp:
            value_count:
              field: "_id"
    on-failure:
      continue: true

  # ── Step 4: Query incident stats ─────────────────────────────────────────
  - name: query_incident_stats
    type: http
    with:
      method: POST
      url: "{{ consts.es_url }}/{{ consts.investigation_index }}/_search"
      headers:
        Content-Type: application/json
        Authorization: "ApiKey {{ consts.es_api_key }}"
      body:
        size: 0
        query:
          range:
            created_at:
              gte: "now-{{ inputs.interval_days }}d"
        aggs:
          by_status:
            terms:
              field: "status.keyword"
          by_severity:
            terms:
              field: "risk_tier.keyword"
          cases_with_id:
            filter:
              bool:
                must:
                  - exists:
                      field: "case_id"
    on-failure:
      continue: true

  # ── Step 5: Compute derived evidence ────────────────────────────────────
  - name: compute_evidence
    type: console
    with:
      message: |
        Evidence summary:
        - Rules with alerts in period: {{ steps.query_detection_rules.output.data.aggregations.by_rule.buckets | size }}
        - TP alerts (30d): {{ steps.query_tp_alerts.output.data.aggregations.total_tp.value | default: 0 }}
        - FP alerts (30d): {{ steps.query_fp_alerts.output.data.aggregations.total_fp.value | default: 0 }}
        - Cases created: {{ steps.query_incident_stats.output.data.aggregations.cases_with_id.doc_count | default: 0 }}

  # ── Step 6: Build evidence base (shared across all frameworks) ───────────
  - name: build_evidence_base
    type: console
    with:
      message: |
        {
          "period_start": "{{ 'now' | date: '%Y-%m-%d' | minus: inputs.interval_days }}",
          "period_end": "{{ 'now' | date: '%Y-%m-%d' }}",
          "active_rules": {{ steps.query_detection_rules.output.data.aggregations.by_rule.buckets | size | default: 0 }},
          "tp_alerts_30d": {{ steps.query_tp_alerts.output.data.aggregations.total_tp.value | default: 0 }},
          "fp_alerts_30d": {{ steps.query_fp_alerts.output.data.aggregations.total_fp.value | default: 0 }},
          "cases_created": {{ steps.query_incident_stats.output.data.aggregations.cases_with_id.doc_count | default: 0 }}
        }

  # ── Step 7: Write DORA evidence (when DORA in frameworks) ────────────────
  - name: check_dora
    type: if
    condition: 'inputs.frameworks: "DORA"'
    steps:
      - name: write_dora_evidence
        type: http
        with:
          method: PUT
          url: "{{ consts.es_url }}/{{ consts.kb_compliance_index }}/_doc/dora-{{ 'now' | date: '%Y-%m-%d' }}"
          headers:
            Content-Type: application/json
            Authorization: "ApiKey {{ consts.es_api_key }}"
          body:
            title: "DORA Compliance Evidence — {{ 'now' | date: '%Y-%m-%d' }}"
            framework: "DORA"
            period_start: "{{ 'now' | date: '%Y-%m-%d' | minus: inputs.interval_days }}"
            period_end: "{{ 'now' | date: '%Y-%m-%d' }}"
            overall_status: "PARTIAL"
            controls:
              - control_id: "DORA-ART-13"
                control_name: "Detect anomalies"
                status: "PARTIAL"
                evidence:
                  active_rules: "{{ steps.query_detection_rules.output.data.aggregations.by_rule.buckets | size | default: 0 }}"
                  mitre_techniques_covered: []
                  tp_alerts_30d: "{{ steps.query_tp_alerts.output.data.aggregations.total_tp.value | default: 0 }}"
                  avg_response_time_hours: 0
                gaps: "MITRE technique mapping not yet implemented — manual review required"
              - control_id: "DORA-ART-14"
                control_name: "Threat intelligence"
                status: "PARTIAL"
                evidence:
                  active_rules: 0
                  mitre_techniques_covered: []
                  tp_alerts_30d: 0
                  avg_response_time_hours: 0
                gaps: "Threat intel feed integration not measured"
              - control_id: "DORA-ART-15"
                control_name: "Respond to incidents"
                status: "COVERED"
                evidence:
                  active_rules: 0
                  mitre_techniques_covered: []
                  tp_alerts_30d: "{{ steps.query_tp_alerts.output.data.aggregations.total_tp.value | default: 0 }}"
                  avg_response_time_hours: 0
                gaps: ""
            summary: "DORA compliance evidence for {{ inputs.interval_days }} day period. TP alerts: {{ steps.query_tp_alerts.output.data.aggregations.total_tp.value | default: 0 }}. Cases created: {{ steps.query_incident_stats.output.data.aggregations.cases_with_id.doc_count | default: 0 }}."
            semantic_summary: "DORA compliance evidence showing coverage for detect anomalies, threat intelligence, and incident response controls"
            category: "compliance-evidence"
            tags:
              - compliance
              - DORA
              - automated
            created_at: "{{ 'now' | date: '%Y-%m-%dT%H:%M:%SZ' }}"

      - name: log_dora_written
        type: console
        with:
          message: "DORA evidence written to kb-compliance"

  # ── Step 8: Write ISO 27001 evidence ─────────────────────────────────────
  - name: check_iso27001
    type: if
    condition: 'inputs.frameworks: "ISO27001"'
    steps:
      - name: write_iso_evidence
        type: http
        with:
          method: PUT
          url: "{{ consts.es_url }}/{{ consts.kb_compliance_index }}/_doc/iso27001-{{ 'now' | date: '%Y-%m-%d' }}"
          headers:
            Content-Type: application/json
            Authorization: "ApiKey {{ consts.es_api_key }}"
          body:
            title: "ISO 27001 Compliance Evidence — {{ 'now' | date: '%Y-%m-%d' }}"
            framework: "ISO27001"
            period_start: "{{ 'now' | date: '%Y-%m-%d' | minus: inputs.interval_days }}"
            period_end: "{{ 'now' | date: '%Y-%m-%d' }}"
            overall_status: "PARTIAL"
            controls:
              - control_id: "ISO-A.12.1.1"
                control_name: "Security incident management"
                status: "COVERED"
                evidence:
                  active_rules: "{{ steps.query_detection_rules.output.data.aggregations.by_rule.buckets | size | default: 0 }}"
                  mitre_techniques_covered: []
                  tp_alerts_30d: "{{ steps.query_tp_alerts.output.data.aggregations.total_tp.value | default: 0 }}"
                  avg_response_time_hours: 0
                gaps: ""
              - control_id: "ISO-A.18.1.1"
                control_name: "Compliance with legal requirements"
                status: "PARTIAL"
                evidence:
                  active_rules: 0
                  mitre_techniques_covered: []
                  tp_alerts_30d: 0
                  avg_response_time_hours: 0
                gaps: "Legal compliance mapping not yet defined"
            summary: "ISO 27001 compliance evidence. TP alerts: {{ steps.query_tp_alerts.output.data.aggregations.total_tp.value | default: 0 }}. FP alerts: {{ steps.query_fp_alerts.output.data.aggregations.total_fp.value | default: 0 }}."
            semantic_summary: "ISO 27001 compliance evidence for security incident management and legal compliance controls"
            category: "compliance-evidence"
            tags:
              - compliance
              - ISO27001
              - automated
            created_at: "{{ 'now' | date: '%Y-%m-%dT%H:%M:%SZ' }}"

      - name: log_iso_written
        type: console
        with:
          message: "ISO 27001 evidence written to kb-compliance"

  # ── Step 9: Write NIS2 evidence ────────────────────────────────────────────
  - name: check_nis2
    type: if
    condition: 'inputs.frameworks: "NIS2"'
    steps:
      - name: write_nis2_evidence
        type: http
        with:
          method: PUT
          url: "{{ consts.es_url }}/{{ consts.kb_compliance_index }}/_doc/nis2-{{ 'now' | date: '%Y-%m-%d' }}"
          headers:
            Content-Type: application/json
            Authorization: "ApiKey {{ consts.es_api_key }}"
          body:
            title: "NIS2 Compliance Evidence — {{ 'now' | date: '%Y-%m-%d' }}"
            framework: "NIS2"
            period_start: "{{ 'now' | date: '%Y-%m-%d' | minus: inputs.interval_days }}"
            period_end: "{{ 'now' | date: '%Y-%m-%d' }}"
            overall_status: "PARTIAL"
            controls:
              - control_id: "NIS2-ART-21"
                control_name: "Risk management"
                status: "PARTIAL"
                evidence:
                  active_rules: "{{ steps.query_detection_rules.output.data.aggregations.by_rule.buckets | size | default: 0 }}"
                  mitre_techniques_covered: []
                  tp_alerts_30d: "{{ steps.query_tp_alerts.output.data.aggregations.total_tp.value | default: 0 }}"
                  avg_response_time_hours: 0
                gaps: "Risk assessment methodology not yet integrated"
              - control_id: "NIS2-ART-23"
                control_name: "Incident response"
                status: "COVERED"
                evidence:
                  active_rules: 0
                  mitre_techniques_covered: []
                  tp_alerts_30d: "{{ steps.query_tp_alerts.output.data.aggregations.total_tp.value | default: 0 }}"
                  avg_response_time_hours: 0
                gaps: ""
            summary: "NIS2 compliance evidence. TP alerts: {{ steps.query_tp_alerts.output.data.aggregations.total_tp.value | default: 0 }}. Cases: {{ steps.query_incident_stats.output.data.aggregations.cases_with_id.doc_count | default: 0 }}."
            semantic_summary: "NIS2 compliance evidence for risk management and incident response controls"
            category: "compliance-evidence"
            tags:
              - compliance
              - NIS2
              - automated
            created_at: "{{ 'now' | date: '%Y-%m-%dT%H:%M:%SZ' }}"

      - name: log_nis2_written
        type: console
        with:
          message: "NIS2 evidence written to kb-compliance"

  # ── Step 10: Write PCI-DSS evidence ───────────────────────────────────────
  - name: check_pcidpss
    type: if
    condition: 'inputs.frameworks: "PCIDSS"'
    steps:
      - name: write_pci_evidence
        type: http
        with:
          method: PUT
          url: "{{ consts.es_url }}/{{ consts.kb_compliance_index }}/_doc/pcidss-{{ 'now' | date: '%Y-%m-%d' }}"
          headers:
            Content-Type: application/json
            Authorization: "ApiKey {{ consts.es_api_key }}"
          body:
            title: "PCI-DSS Compliance Evidence — {{ 'now' | date: '%Y-%m-%d' }}"
            framework: "PCIDSS"
            period_start: "{{ 'now' | date: '%Y-%m-%d' | minus: inputs.interval_days }}"
            period_end: "{{ 'now' | date: '%Y-%m-%d' }}"
            overall_status: "PARTIAL"
            controls:
              - control_id: "PCI-10.1"
                control_name: "Audit log review"
                status: "COVERED"
                evidence:
                  active_rules: "{{ steps.query_detection_rules.output.data.aggregations.by_rule.buckets | size | default: 0 }}"
                  mitre_techniques_covered: []
                  tp_alerts_30d: "{{ steps.query_tp_alerts.output.data.aggregations.total_tp.value | default: 0 }}"
                  avg_response_time_hours: 0
                gaps: ""
              - control_id: "PCI-11.1"
                control_name: "Malware detection"
                status: "PARTIAL"
                evidence:
                  active_rules: 0
                  mitre_techniques_covered: []
                  tp_alerts_30d: 0
                  avg_response_time_hours: 0
                gaps: "Malware-specific detection rules not yet deployed"
            summary: "PCI-DSS compliance evidence. TP alerts: {{ steps.query_tp_alerts.output.data.aggregations.total_tp.value | default: 0 }}. FP alerts: {{ steps.query_fp_alerts.output.data.aggregations.total_fp.value | default: 0 }}."
            semantic_summary: "PCI-DSS compliance evidence for audit log review and malware detection requirements"
            category: "compliance-evidence"
            tags:
              - compliance
              - PCIDSS
              - automated
            created_at: "{{ 'now' | date: '%Y-%m-%dT%H:%M:%SZ' }}"

      - name: log_pci_written
        type: console
        with:
          message: "PCI-DSS evidence written to kb-compliance"

  # ── Step 11: Confirm ───────────────────────────────────────────────────────
  - name: confirm
    type: console
    with:
      message: |
        Compliance Continuous Assessment complete.
        Frameworks assessed: {{ inputs.frameworks }}
        Period: last {{ inputs.interval_days }} days.
        Evidence written to kb-compliance index.
        Review kb-compliance in Kibana for full evidence documents.
