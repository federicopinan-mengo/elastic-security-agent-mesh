name: Invoke an Agent
description: Invoke an agent for alert triage via the ai.agent step type.
enabled: true

tags:
  - agent-mesh
  - ai-agents

triggers:
  - type: manual
  - type: alert

steps:

  - name: log_for_debug
    type: console
    with:
      message: "Alert event received, invoking triage agent"

  - name: invoke_triage_agent
    type: ai.agent
    with:
      agent_id: "security-mesh.l1-triage-analyst"
      message: "Triage the following alert based on your system instructions: {{event | json}}"
