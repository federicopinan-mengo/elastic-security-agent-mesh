name: Call Subagent Workflow
description: Invoke a specialist agent via the ai.agent step type.
enabled: true

tags:
  - agent-mesh
  - ai-agents

triggers:
  - type: manual

inputs:
  - name: agent_id
    type: string
    description: The ID of the agent to invoke
    required: true
  - name: question
    type: string
    description: The question or prompt to send to the subagent
    required: true

steps:

  - name: debug_inputs
    type: console
    with:
      message: "Calling agent={{ inputs.agent_id }}"

  - name: converse_with_agent
    type: ai.agent
    with:
      agent_id: "{{ inputs.agent_id }}"
      message: "{{ inputs.question }}"

  - name: filter_output
    type: console
    with:
      message: "{{ steps.converse_with_agent.output }}"
