# =============================================================================
# Workflow: Dispatch Monitor
# Category: mesh
#
# Scheduled workflow that polls the dispatch-requests index for pending
# async agent dispatches. Each target agent is invoked in its own
# independent session with a fresh token budget and timeout window.
#
# This breaks the synchronous chain: instead of L1 → L2 → TI nested
# inside one workflow, each agent runs independently:
#   L1 writes dispatch for L2 → L1 session ends
#   Monitor invokes L2 → L2 writes dispatch for TI → L2 session ends
#   Monitor invokes TI → TI completes → TI session ends
#
# Processes up to 3 dispatches per run. Runs every minute.
# Urgent priority dispatches are processed first.
#
# Author: Security Agent Mesh
# =============================================================================
name: Dispatch Monitor
description: Polls for pending async dispatch requests and invokes target agents independently.
enabled: true

tags:
  - agent-mesh
  - mesh
  - scheduled

triggers:
  - type: scheduled
    with:
      every: "1m"

consts:
  es_url: "__ES_URL__"
  es_api_key: "__ES_API_KEY__"
  kibana_url: "__KIBANA_URL__"
  kibana_space: "__KIBANA_SPACE__"
  kibana_api_key: "__KIBANA_API_KEY__"

steps:

  # ── Step 1: Find pending dispatch requests ──────────────────────────────
  - name: find_pending
    type: http
    on-failure:
      continue: true
    with:
      method: POST
      url: "{{ consts.es_url }}/dispatch-requests/_search"
      headers:
        Content-Type: application/json
        Authorization: "ApiKey {{ consts.es_api_key }}"
      body:
        size: 3
        query:
          term:
            status: "pending"
        sort:
          - priority.keyword:
              order: "asc"
              unmapped_type: "keyword"
          - created_at: "asc"

  # ── Step 2: Process each pending dispatch ───────────────────────────────
  - name: process_dispatches
    type: foreach
    foreach: "{{ steps.find_pending.output.data.hits.hits }}"
    steps:

      # 2a. Mark as dispatched (prevents re-processing on next run)
      - name: mark_dispatched
        type: http
        with:
          method: POST
          url: "{{ consts.es_url }}/dispatch-requests/_update/{{ foreach.item._id }}"
          headers:
            Content-Type: application/json
            Authorization: "ApiKey {{ consts.es_api_key }}"
          body:
            doc:
              status: "dispatched"
              dispatched_at: "{{ 'now' | date: '%Y-%m-%dT%H:%M:%SZ' }}"

      - name: log_dispatch
        type: console
        with:
          message: "Dispatching {{ foreach.item._source.dispatch_id }} to {{ foreach.item._source.target_agent }}"

      # 2b. Invoke the target agent via ai.agent step (server-to-server,
      # bypasses the 5-minute HTTP proxy timeout, gets full 30-min window).
      - name: invoke_agent
        type: ai.agent
        on-failure:
          continue: true
        with:
          agent_id: "{{ foreach.item._source.target_agent }}"
          message: "{{ foreach.item._source.context }}"

      # 2c. Detect success or failure.
      # ai.agent returns the agent's text response on success.
      # on-failure: continue sets output to null on failure.
      # The console + default pattern safely extracts a testable value.
      - name: agent_result
        type: console
        with:
          message: "{{ steps.invoke_agent.output | default: 'AGENT_CALL_FAILED' }}"

      - name: check_failed
        type: if
        condition: 'steps.agent_result.output: AGENT_CALL_FAILED'
        steps:

          # Retry logic: increment retry_count and reset to pending if under
          # the threshold (3 attempts). If at or over, mark as permanently
          # failed and notify on the case.
          - name: retry_or_fail
            type: http
            on-failure:
              continue: true
            with:
              method: POST
              url: "{{ consts.es_url }}/dispatch-requests/_update/{{ foreach.item._id }}"
              headers:
                Content-Type: application/json
                Authorization: "ApiKey {{ consts.es_api_key }}"
              body:
                script:
                  source: >
                    int retries = ctx._source.containsKey('retry_count') ? ctx._source.retry_count : 0;
                    retries++;
                    ctx._source.retry_count = retries;
                    if (retries >= 3) {
                      ctx._source.status = 'failed';
                      ctx._source.completed_at = params.now;
                      ctx._source.result_summary = 'Agent call failed after 3 attempts.';
                    } else {
                      ctx._source.status = 'pending';
                      ctx._source.result_summary = 'Attempt ' + retries + ' failed — will retry on next cycle.';
                    }
                  params:
                    now: "{{ 'now' | date: '%Y-%m-%dT%H:%M:%SZ' }}"

          - name: log_failure
            type: console
            with:
              message: "Dispatch {{ foreach.item._source.dispatch_id }} to {{ foreach.item._source.target_agent }} failed — reset to pending for retry."

          - name: check_retries_exhausted
            type: if
            condition: 'foreach.item._source.retry_count: 2'
            steps:
              - name: notify_failure_on_case
                type: http
                on-failure:
                  continue: true
                with:
                  method: POST
                  url: "{{ consts.kibana_url }}/s/{{ consts.kibana_space }}/api/cases/{{ foreach.item._source.case_id }}/comments"
                  headers:
                    Content-Type: application/json
                    Authorization: "ApiKey {{ consts.kibana_api_key }}"
                    kbn-xsrf: "true"
                    elastic-api-version: "2023-10-31"
                  body:
                    type: "user"
                    comment: |
                      ## Agent Dispatch Failed After 3 Attempts

                      **Dispatch ID:** {{ foreach.item._source.dispatch_id }}
                      **Target Agent:** {{ foreach.item._source.target_agent }}

                      The agent call failed 3 times (likely due to repeated timeouts or model errors). A human may need to investigate manually or retry by setting the dispatch status back to "pending" in the dispatch-requests index.
                    owner: "securitySolution"

        else:

          - name: mark_completed
            type: http
            on-failure:
              continue: true
            with:
              method: POST
              url: "{{ consts.es_url }}/dispatch-requests/_update/{{ foreach.item._id }}"
              headers:
                Content-Type: application/json
                Authorization: "ApiKey {{ consts.es_api_key }}"
              body:
                doc:
                  status: "completed"
                  completed_at: "{{ 'now' | date: '%Y-%m-%dT%H:%M:%SZ' }}"
                  result_summary: "Agent responded successfully."

          - name: log_success
            type: console
            with:
              message: "Dispatch {{ foreach.item._source.dispatch_id }} completed successfully."
